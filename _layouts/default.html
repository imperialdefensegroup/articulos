<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>{{ page.title }}</title>

  <!-- SEO básico -->
  {% if page.description %}
  <meta name="description" content="{{ page.description }}">
  {% endif %}

  <!-- Canonical -->
  {% if page.canonical %}
  <link rel="canonical" href="{{ page.canonical }}">
  {% endif %}

  <!-- Estilos -->
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Arial, sans-serif;
      line-height: 1.6;
      max-width: 820px;
      margin: 40px auto;
      padding: 0 16px;
      font-size: 17px;
    }

    header, footer {
      opacity: 0.95;
    }

    header h1 {
      margin: 0 0 5px 0;
      font-size: 28px;
      line-height: 1.2;
    }

    header a {
      text-decoration: none;
      color: inherit;
    }

    main {
      margin-top: 20px;
    }

    h1 {
      font-size: 28px;
      line-height: 1.2;
    }

    h2 {
      font-size: 22px;
      margin-top: 30px;
    }

    p {
      margin: 12px 0;
    }

    img {
      max-width: 100%;
      height: auto;
      border-radius: 6px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      display: block;
      overflow-x: auto;
      margin: 20px 0;
    }

    th, td {
      padding: 8px;
      border: 1px solid #ddd;
      text-align: left;
    }

    a {
      word-break: break-word;
    }

    pre, code {
      white-space: pre-wrap;
      word-break: break-word;
    }

    hr {
      margin: 30px 0;
    }

    footer {
      text-align: center;
      margin-top: 30px;
      font-size: 14px;
    }

    /* RESPONSIVE */
    @media (max-width: 600px) {
      body {
        margin: 20px auto;
        padding: 0 14px;
        font-size: 16px;
      }

      h1 {
        font-size: 24px;
      }

      h2 {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>
    <a href="https://imperialdefensegroup.github.io/home/">
      Imperial Defense Group
    </a>
  </h1>
  {% if site.description %}
  <p>{{ site.description }}</p>
  {% endif %}
  <hr>
</header>

<main>
  {{ content }}
</main>

<hr>

<footer>
  <p>© {{ "now" | date: "%Y" }} Imperial Defense Group</p>

  <!-- BOTÓN ROJO CENTRADO -->
  <p style="margin-top: 12px;">
    <a href="https://imperialdefensegroup.github.io/home/"
       style="display: inline-block; background-color: #c1121f; color: #fff; padding: 12px 22px; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 15px;">
      Inicio
    </a>
  </p>
</footer>

</body>
</html>
